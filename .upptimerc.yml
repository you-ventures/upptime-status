owner: you-ventures
repo: upptime-status

sites:
  - name: AgentAIShield
    url: https://agentaishield.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: AAIS App
    url: https://agentaishield.com/app.html
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: AAIS API Auth
    url: https://agentaishield.com/api/auth/me
    expectedStatusCodes:
      - 200
      - 401

  - name: AAIS Ingest API
    url: https://agentaishield.com/api/v1/ingest
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"test": true}'
    expectedStatusCodes:
      - 200
      - 401
      - 400

status-website:
  cname: status.agentaishield.com
  logoUrl: https://agentaishield.com/logos/brand/mark/logo-mark-gradient.svg
  name: AgentAIShield Status
  theme: dark
  customHeadHtml: "<style>:root{--body-background-color:#0a0a14!important;--body-text-color:#e2e8f0!important;--card-background-color:#111127!important;--nav-background-color:#0d0d1f!important;--nav-border-bottom-color:#1e1e3a!important;--nav-current-border-bottom-color:#6366f1!important;--card-border-color:#1e1e3a!important;--up-border-left-color:#6366f1!important;--down-border-left-color:#ef4444!important;--down-background-color:#3b0f0f!important;--degraded-border-left-color:#f59e0b!important;--tag-color:#0a0a14!important;--tag-up-background-color:#6366f1!important;--tag-down-background-color:#ef4444!important;--tag-degraded-background-color:#f59e0b!important;--change-background-color:#f59e0b!important;--error-button-border-color:#4f46e5!important;--error-button-background-color:#6366f1!important;--error-button-color:#fff!important;--submit-button-border-color:#4f46e5!important;--submit-button-background-color:#6366f1!important;--submit-button-color:#fff!important;--graph-filter:hue-rotate(200deg) saturate(1.8) brightness(0.9)!important}body{background-color:#0a0a14!important;color:#e2e8f0!important;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif!important}nav,header{background-color:#0d0d1f!important;border-bottom-color:#1e1e3a!important}nav a,header a{color:#a5b4fc!important}nav a:hover,header a:hover{color:#6366f1!important}article.graph{background-color:#111127!important;border-color:#1e1e3a!important;border-radius:12px!important;background-image:none!important;--background:none!important}article.up.graph{border-left-color:#6366f1!important}article.up:not(.graph){background-color:rgba(99,102,241,0.08)!important;border-color:#6366f1!important;border-left:4px solid #6366f1!important;border-radius:12px!important}a{color:#818cf8!important}a:hover{color:#6366f1!important}.graph h4 a{color:#e2e8f0!important}.graph h4 a:hover{color:#818cf8!important}.data{color:#a5b4fc!important;font-weight:600!important}.f.up,.badge.up{background-color:#6366f1!important;color:#fff!important;border-radius:6px!important;padding:2px 10px!important}.r a,.r button{color:#64748b!important}.r a:hover,.r button:hover,.r a.active,.r button.active{color:#6366f1!important}h2{color:#e2e8f0!important}.lead{color:#94a3b8!important}footer,.container>p:last-child{color:#64748b!important}footer a{color:#818cf8!important}nav .logo,header .logo{color:#e2e8f0!important}h1 strong{color:#6366f1!important}.icon{border-radius:4px!important;filter:brightness(1.2)!important}.container{max-width:900px!important}</style>"
  introTitle: "**AgentAIShield** — Service Status"
  introMessage: Real-time uptime monitoring for AgentAIShield services. Checks every 5 minutes. Powered by [Upptime](https://github.com/upptime/upptime).
