owner: you-ventures
repo: upptime-status

sites:
  - name: AgentAIShield
    url: https://agentaishield.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: AAIS App
    url: https://agentaishield.com/app.html
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: AAIS API Auth
    url: https://agentaishield.com/api/auth/me
    expectedStatusCodes:
      - 200
      - 401

  - name: AAIS Ingest API
    url: https://agentaishield.com/api/v1/ingest
    method: POST
    headers:
      Content-Type: application/json
    body: '{"test": true}'
    expectedStatusCodes:
      - 200
      - 401
      - 400

  - name: Apex AI
    url: https://apex-ai-production.up.railway.app
    expectedStatusCodes:
      - 200
      - 301
      - 302

status-website:
  baseUrl: /upptime-status
  logoUrl: https://agentaishield.com/images/aais-logo.png
  name: You! Ventures Status
  theme: dark
  introTitle: "**You! Ventures** — Service Status"
  introMessage: Real-time status for AgentAIShield, Apex AI, and other You! Ventures services. Powered by [Upptime](https://github.com/upptime/upptime).
  navbar:
    - title: Status
      href: /
    - title: AgentAIShield
      href: https://agentaishield.com
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
