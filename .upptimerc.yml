owner: you-ventures
repo: upptime-status

sites:
  - name: AgentAIShield
    url: https://agentaishield.com
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: AAIS App
    url: https://agentaishield.com/app.html
    expectedStatusCodes:
      - 200
      - 301
      - 302

  - name: AAIS API Auth
    url: https://agentaishield.com/api/auth/me
    expectedStatusCodes:
      - 200
      - 401

  - name: AAIS Ingest API
    url: https://agentaishield.com/api/v1/ingest
    method: POST
    headers:
      - "Content-Type: application/json"
    body: '{"test": true}'
    expectedStatusCodes:
      - 200
      - 401
      - 400

status-website:
  cname: status.agentaishield.com
  logoUrl: https://agentaishield.com/logos/brand/mark/logo-mark-gradient.svg
  name: AgentAIShield
  theme: dark
  customHeadHtml: "<link href='https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap' rel='stylesheet'><style>:root{--body-background-color:#0a0a0f!important;--body-text-color:#e2e8f0!important;--card-background-color:#12121e!important;--nav-background-color:rgba(0,0,0,0.6)!important;--nav-border-bottom-color:#1a1a2e!important;--nav-current-border-bottom-color:#6366f1!important;--card-border-color:#1a1a2e!important;--up-border-left-color:#6366f1!important;--down-border-left-color:#ef4444!important;--down-background-color:#2d0a0a!important;--degraded-border-left-color:#f59e0b!important;--tag-color:#0a0a0f!important;--tag-up-background-color:#6366f1!important;--tag-down-background-color:#ef4444!important;--tag-degraded-background-color:#f59e0b!important;--change-background-color:#f59e0b!important;--error-button-border-color:#4f46e5!important;--error-button-background-color:#6366f1!important;--error-button-color:#fff!important;--submit-button-border-color:#4f46e5!important;--submit-button-background-color:#6366f1!important;--submit-button-color:#fff!important;--graph-filter:hue-rotate(200deg) saturate(1.5) brightness(0.85)!important}*{font-family:Inter,-apple-system,system-ui,sans-serif!important}body{background-color:#0a0a0f!important;color:#e2e8f0!important;font-size:14px!important}nav,header{background:rgba(0,0,0,0.6)!important;border-bottom:1px solid #1a1a2e!important;backdrop-filter:blur(12px)!important;-webkit-backdrop-filter:blur(12px)!important}nav .logo,header .logo{font-weight:600!important;font-size:15px!important;color:#e2e8f0!important;letter-spacing:-0.01em!important}nav .logo img{width:28px!important;height:28px!important;border-radius:50%!important;border:2px solid #6366f1!important}nav a,header a{color:#94a3b8!important;font-size:14px!important;font-weight:500!important}nav a:hover,header a:hover{color:#e2e8f0!important}nav ul li:last-child a{background:#6366f1!important;color:#fff!important;padding:6px 16px!important;border-radius:8px!important;font-weight:600!important;font-size:13px!important}nav ul li:last-child a:hover{background:#4f46e5!important;color:#fff!important}article.graph{background-color:#12121e!important;border:1px solid #1a1a2e!important;border-radius:12px!important;border-left:3px solid #6366f1!important;position:relative!important;overflow:hidden!important;padding:20px!important}article.graph::before{content:''!important;position:absolute!important;top:0!important;right:0!important;bottom:0!important;width:60%!important;background-image:var(--background)!important;background-size:contain!important;background-repeat:no-repeat!important;background-position:right center!important;filter:grayscale(100%) sepia(100%) hue-rotate(220deg) saturate(3) brightness(0.6)!important;opacity:0.5!important;pointer-events:none!important;z-index:0!important}article.graph>*{position:relative!important;z-index:1!important}article.up:not(.graph){background:rgba(99,102,241,0.06)!important;border:1px solid rgba(99,102,241,0.3)!important;border-left:3px solid #6366f1!important;border-radius:12px!important;padding:16px 20px!important}a{color:#818cf8!important;text-decoration:none!important}a:hover{color:#a5b4fc!important}.graph h4{font-size:15px!important;font-weight:600!important;margin-bottom:4px!important}.graph h4 a{color:#e2e8f0!important}.graph h4 a:hover{color:#a5b4fc!important}.graph .icon{width:20px!important;height:20px!important;border-radius:4px!important;margin-right:8px!important;filter:brightness(1.3)!important}.graph div{font-size:13px!important;color:#94a3b8!important}.data{color:#a5b4fc!important;font-weight:600!important;font-size:14px!important}.f.up,.badge.up{background:#6366f1!important;color:#fff!important;border-radius:6px!important;padding:3px 10px!important;font-size:12px!important;font-weight:600!important}h1{font-size:24px!important;font-weight:700!important;letter-spacing:-0.02em!important}h1 strong{color:#6366f1!important}h2{color:#e2e8f0!important;font-size:16px!important;font-weight:600!important}.lead{color:#94a3b8!important;font-size:14px!important;margin-top:4px!important}.r label,.r a,.r button{color:#64748b!important;font-size:12px!important;font-weight:500!important}.r label:hover,.r a:hover,.r button:hover{color:#6366f1!important}input[type=radio]:checked+label{color:#6366f1!important;font-weight:600!important}footer,.container>p:last-child{color:#475569!important;font-size:12px!important}footer a{color:#6366f1!important}.container{max-width:880px!important;padding:0 24px!important}header.svelte-ngkazm{padding:32px 0 24px!important}section{margin-bottom:8px!important}.live-status{gap:8px!important}</style><script src='https://unpkg.com/@phosphor-icons/web@2.1.1'></script><script>document.addEventListener('DOMContentLoaded',function(){function fix(){document.querySelectorAll('article.graph').forEach(function(g){g.style.setProperty('background-image','none','important')});document.querySelectorAll('article.up:not(.graph)').forEach(function(a){var t=a.textContent||'';if(t.indexOf('operational')>-1||t.indexOf('All systems')>-1){a.innerHTML=a.innerHTML.replace(/[\u2705\u2611\uFE0F\u2714]/g,'').replace(/All systems/,'<i class=\"ph ph-shield-check\" style=\"color:#6366f1;font-size:20px;vertical-align:middle;margin-right:6px\"></i>All systems')}});document.querySelectorAll('h1 strong, .logo div, .logo span, nav .logo, header .logo, a').forEach(function(el){if(el.innerHTML.indexOf('AgentAIShield')>-1&&el.innerHTML.indexOf('aishield-ai')< 0){el.innerHTML=el.innerHTML.replace(/Agent(AI)Shield/g,'Agent<span class=\"aishield-ai\" style=\"color:#6366f1\">AI</span>Shield')}});requestAnimationFrame(function(){setTimeout(fix,800)})}setTimeout(fix,200);new MutationObserver(function(){fix()}).observe(document.body,{childList:true,subtree:true})})</script>"
  introTitle: "**AgentAIShield** — Service Status"
  introMessage: Real-time uptime monitoring for AgentAIShield services. Checks every 5 minutes.
  navbar:
    - title: Status
      href: /
    - title: AgentAIShield
      href: https://agentaishield.com
    - title: Login
      href: https://agentaishield.com/login.html
